version: '3.8'

services:
  database:
    image: mongo:6.0
    container_name: medimind-db
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    environment:
      MONGO_INITDB_DATABASE: medimind
    networks:
      - medimind-network

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: medimind-api
    ports:
      - "5000:5000"
    depends_on:
      - database
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://database:27017/medimind
      - JWT_ACCESS_SECRET=local_dev_access_secret_key_12345
      - JWT_REFRESH_SECRET=local_dev_refresh_secret_key_12345
      - GEMINI_API_KEY=mock_key_placeholder
    networks:
      - medimind-network

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: medimind-ui
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - medimind-network

volumes:
  mongo-data:

networks:
  medimind-network:
    driver: bridge
